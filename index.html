<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>弓道団体戦専用タイマー</title>
<style>
body {
  margin: 0;
  font-family: serif;
  text-align: center;
}

.timer-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 70vh;
}

.timer {
  position: relative;
  width: 40vw;
  height: 40vw;
  margin: 10px;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  pointer-events: none;
}

circle {
  fill: none;
  stroke-width: 20;
}

.bg { stroke: #eee; }
.progress { stroke-linecap: round; }

.time-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 5vw;
  font-weight: bold;
}

button {
  margin: 10px;
  padding: 15px;
  font-size: 20px;
  touch-action: manipulation;
}
</style>
</head>

<body>

<h1>男子団体戦タイマー</h1>

<div class="timer-container" id="timers"></div>

<button onclick="toggle()">スタート / ストップ</button>
<button onclick="extend()">延長 +1分</button>

<script>
let total = 480;
let time = 480;
let extTime = null;

let running = false;
let interval;

let endTime;
let extEndTime;

function draw() {
  let html = createTimer("Main");
  if (extTime !== null) html += createTimer("Ext");
  document.getElementById("timers").innerHTML = html;
}

function createTimer(id) {
  return `
  <div class="timer">
    <svg viewBox="0 0 300 300">
      <circle class="bg" cx="150" cy="150" r="120"></circle>
      <circle id="prog${id}" class="progress" cx="150" cy="150" r="120"
        stroke-dasharray="754" stroke-dashoffset="754"></circle>
    </svg>
    <div id="time${id}" class="time-text"></div>
  </div>`;
}

function toggle() {
  if (!running) {
    running = true;
    endTime = Date.now() + time * 1000;

    if (extTime !== null) {
      extEndTime = Date.now() + extTime * 1000;
    }

    interval = setInterval(tick, 50);
  } else {
    running = false;
    clearInterval(interval);
  }
}

function tick() {
  const now = Date.now();

  const remainMain = endTime - now;
  time = Math.max(0, Math.floor(remainMain / 1000));

  if (extTime !== null) {
    const remainExt = extEndTime - now;
    extTime = Math.max(0, Math.floor(remainExt / 1000));
  }

  update();

  if (remainMain <= 0 && (!extTime || extTime === 0)) {
    clearInterval(interval);
    running = false;
  }
}

function extend() {
  if (!running || extTime !== null) return;

  // 残りに＋60秒
  endTime += 60000;

  // 表示用に延長タイマー作る
  extTime = 60;
  extEndTime = Date.now() + 60000;

  draw();
}

function update() {
  updateCircle("Main", time, total);

  if (extTime !== null) {
    updateCircle("Ext", extTime, 60);
  }
}

function updateCircle(id, t, totalT) {
  const circle = document.getElementById("prog"+id);
  const offset = 754 * (t / totalT);
  circle.style.strokeDashoffset = offset;

  document.getElementById("time"+id).innerText =
    Math.floor(t/60)+":"+String(t%60).padStart(2,"0");
}

draw();
</script>

</body>
</html>
