<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>弓道団体戦専用タイマー</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 32px;
}

/* ボタン */
.select-btn {
  width: 320px;
  height: 110px;
  font-size: 26px;
  margin: 20px;
  border-radius: 20px;
  touch-action: manipulation;
}

button {
  touch-action: manipulation;
  margin: 10px;
  padding: 15px;
  font-size: 20px;
  border-radius: 12px;
}

/* タイマー */
.timer-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 70vh;
}

.timer {
  position: relative;
  width: 45vw;
  max-width: 600px;
  height: 45vw;
  max-height: 600px;
}

svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  pointer-events: none;
}

circle {
  fill: none;
  stroke-width: 25;
}

.bg { stroke: #eee; }
.progress { stroke-linecap: round; }

/* 文字 */
.time-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 6vw;
  font-weight: bold;
}

.notice {
  font-size: 2.5vw;
  height: 50px;
}

/* UI */
.hidden { display: none; }
</style>
</head>

<body>

<h1>弓道団体戦専用タイマー</h1>

<div id="menu">
  <button class="select-btn" onclick="startGame(480)">男子団体（8分）</button>
  <button class="select-btn" onclick="startGame(330)">女子団体（5分30秒）</button>
</div>

<div id="game" class="hidden">

  <div class="timer-container">
    <div class="timer">
      <svg viewBox="0 0 300 300">
        <circle class="bg" cx="150" cy="150" r="120"></circle>
        <circle id="circle" class="progress" cx="150" cy="150" r="120"
          stroke-dasharray="754" stroke-dashoffset="754"></circle>
      </svg>

      <div id="time" class="time-text"></div>
      <div id="note" class="notice"></div>
    </div>
  </div>

  <button onclick="toggle()">スタート / ストップ</button>
  <button onclick="extend()" id="extendBtn">延長 +1分</button>
  <button onclick="reset()">リセット</button>
  <button onclick="back()">戻る</button>

</div>

<script>
let total = 0;
let time = 0;

let running = false;
let interval = null;

let endTime = 0;
let extended = false;

function startGame(sec) {
  total = sec;
  time = sec;
  extended = false;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  draw();
}

function draw() {
  update();
}

function toggle() {
  if (!running) {
    running = true;
    endTime = Date.now() + time * 1000;
    interval = setInterval(tick, 50);
  } else {
    running = false;
    clearInterval(interval);
  }
}

function tick() {
  const now = Date.now();
  const remain = endTime - now;

  time = Math.max(0, Math.floor(remain / 1000));

  update();

  if (remain <= 0) {
    clearInterval(interval);
    running = false;
  }
}

/* 延長：＋60秒（男子・女子共通） */
function extend() {
  if (!running || extended) return;

  extended = true;
  endTime += 60000;
  total += 60;

  document.getElementById("extendBtn").style.background = "#ccc";
}

function format(t) {
  const m = Math.floor(t / 60);
  const s = t % 60;
  return `${m}:${s.toString().padStart(2,"0")}`;
}

function getColor(t) {
  if (t === 0) return "#8B0000";
  if (t <= 30) return "#d97706";
  if (t <= 60) return "#1e3a8a";
  return "#333";
}

function getNotice(t) {
  if (t <= 60 && t > 30) return "残り1分";
  if (t <= 30 && t > 0) return "残り30秒　同時打ち起こし開始";
  if (t === 0) return "終了";
  return "";
}

function update() {
  const circle = document.getElementById("circle");

  const percent = time / total;
  const offset = 754 * (1 - percent);

  circle.style.strokeDashoffset = offset;
  circle.style.stroke = getColor(time);

  document.getElementById("time").innerText = format(time);
  document.getElementById("time").style.color = getColor(time);

  document.getElementById("note").innerText = getNotice(time);
  document.getElementById("note").style.color = getColor(time);
}

function reset() {
  time = total;
  running = false;
  extended = false;
  clearInterval(interval);

  document.getElementById("extendBtn").style.background = "";
  draw();
}

function back() {
  reset();
  document.getElementById("game").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}
</script>

</body>
</html>
